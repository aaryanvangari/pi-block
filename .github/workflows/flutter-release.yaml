name: Flutter Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

jobs:
  # ============================================================
  # VERIFY
  # ============================================================
  verify:
    name: Verify Flutter Project
    runs-on: ubuntu-latest

    # ------------------------------------------------------------
    # Export variables from flutter_version step
    # ------------------------------------------------------------
    outputs:
      version: ${{ steps.flutter_version.outputs.version_number }}
      build_number: ${{ steps.flutter_version.outputs.build_number }}

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v6

      # ------------------------------------------------------------
      # Java (required for Android builds)
      # ------------------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ------------------------------------------------------------
      # Flutter
      # ------------------------------------------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # ------------------------------------------------------------
      # Dependencies
      # ------------------------------------------------------------
      - name: Install dependencies
        run: flutter pub get

      # ------------------------------------------------------------
      # Formatting check (NO auto-format)
      # ------------------------------------------------------------
      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed .

      # ------------------------------------------------------------
      # Static analysis
      # ------------------------------------------------------------
      - name: Flutter analyze
        run: flutter analyze .

      # ------------------------------------------------------------
      # Tests
      # ------------------------------------------------------------
      - name: Run tests
        run: flutter test

      # ------------------------------------------------------------
      # Get version info
      # ------------------------------------------------------------
      - name: Get Flutter Version
        id: flutter_version
        uses: bungabear/flutter_version_read@main
        with:
          file: ./pubspec.yaml

      # ------------------------------------------------------------
      # Version safety check
      # ------------------------------------------------------------
      - name: Verify pubspec version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          PUB_VERSION=${{ steps.flutter_version.outputs.version_number }}
          PUB_BUILD=${{ steps.flutter_version.outputs.build_number }}

          echo "pubspec.yaml version: " ${{ steps.flutter_version.outputs.version_number }}
          echo "pubspec.yaml build: " ${{ steps.flutter_version.outputs.build_number }}
          echo "git tag version: $TAG_VERSION"

          if [ "$PUB_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            exit 1
          fi

  # ============================================================
  # ANDROID RELEASE
  # ============================================================
  android-release:
    name: Android Release
    runs-on: ubuntu-latest
    needs: verify

    env:
      APP_NAME: Pi-Block

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Java (required for Android builds)
      # ------------------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ------------------------------------------------------------
      # Flutter
      # ------------------------------------------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.6
          cache: true

      # ------------------------------------------------------------
      # Dependencies
      # ------------------------------------------------------------
      - name: Install dependencies
        run: flutter pub get

      # ------------------------------------------------------------
      # Decode keystore
      # ------------------------------------------------------------
      - name: Decode Keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/piblock-release-key.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # ------------------------------------------------------------
      # Create key.properties dynamically
      # ------------------------------------------------------------
      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ vars.KEY_ALIAS }}
          storeFile=piblock-release-key.jks
          EOF

      # ------------------------------------------------------------
      # Build Android APK
      # ------------------------------------------------------------
      - name: Build release APK
        run: flutter build apk --release

      # ------------------------------------------------------------
      # Build Android App Bundle
      # ------------------------------------------------------------
      - name: Build release App Bundle
        run: flutter build appbundle --release

      # ------------------------------------------------------------
      # Rename artifacts with app name
      # ------------------------------------------------------------
      - name: Rename release artifacts
        run: |
          VERSION=${{ needs.verify.outputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${APP_NAME}-${VERSION}.apk

          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/${APP_NAME}-${VERSION}.aab

      # ------------------------------------------------------------
      # GitHub Release
      # ------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/${{ env.APP_NAME }}-${{ needs.verify.outputs.version }}.apk
            build/app/outputs/bundle/release/${{ env.APP_NAME }}-${{ needs.verify.outputs.version }}.aab

      
      # ------------------------------------------------------------
      # Decode Play service account
      # ------------------------------------------------------------
      - name: Decode Play Service Account
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON" | base64 --decode > play-account.json
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}

      # ------------------------------------------------------------
      # Setup Fastlane
      # ------------------------------------------------------------
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      # - name: Install dependencies
      #   run: bundle install

      # ------------------------------------------------------------
      # Deploy to Google Play using Fastlane
      # ------------------------------------------------------------
      - name: Deploy to Internal
        run: bundle exec fastlane android internal
        env:
          PACKAGE_NAME: ${{ vars.PACKAGE_NAME }}
          GOOGLE_CLOUD_SERVICE_ACCOUNT_JSON: play-account.json
          AAB_PATH: build/app/outputs/bundle/release/${{ env.APP_NAME }}-${{ needs.verify.outputs.version }}.aab
          VERSION_CODE: ${{ needs.verify.outputs.build_number }}

      - name: Promote to Alpha
        run: bundle exec fastlane android alpha
        env:
          PACKAGE_NAME: ${{ vars.PACKAGE_NAME }}
          GOOGLE_CLOUD_SERVICE_ACCOUNT_JSON: play-account.json

  # ============================================================
  # IOS RELEASE
  # ============================================================
  ios-release:
    name: iOS Release
    runs-on: macos-15
    needs: verify

    env:
      APP_NAME: Pi-Block

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Flutter
      # ------------------------------------------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.6
          cache: true

      # ------------------------------------------------------------
      # Ruby
      # ------------------------------------------------------------
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true
      
        # Check if its needed
      # - name: Install dependencies
      #   run: bundle install

      # ------------------------------------------------------------
      # Cache CocoaPods
      # ------------------------------------------------------------
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}

      # ------------------------------------------------------------
      # Install dependencies
      # ------------------------------------------------------------
      - name: Install Flutter dependencies
        run: flutter pub get

      # ------------------------------------------------------------
      # Install CocoaPods
      # ------------------------------------------------------------
      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      # ------------------------------------------------------------
      # Decode App Store Connect API key
      # ------------------------------------------------------------
      - name: Decode Apple Store Connect API key
        run: |
          mkdir -p fastlane
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > fastlane/AuthKey.p8
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}

      # ------------------------------------------------------------
      # Create App Store Connect API Key JSON
      # ------------------------------------------------------------
      - name: Create App Store Connect API Key JSON
        run: |
          KEY_CONTENT=$(awk '{printf "%s\\n", $0}' fastlane/AuthKey.p8)

          cat > fastlane/app_store_connect_api_key.json <<EOF
          {
            "key_id": "${{ secrets.APPSTORE_KEY_ID }}",
            "issuer_id": "${{ secrets.APPSTORE_ISSUER_ID }}",
            "key": "$KEY_CONTENT"
          }
          EOF

      # ------------------------------------------------------------
      # Listing Xcode versions (for debugging)
      # ------------------------------------------------------------
      - name: List installed Xcode versions
        run: ls /Applications | grep Xcode

      # ------------------------------------------------------------
      # Pinning Xcode version (required for Flutter 3.35+)
      # ------------------------------------------------------------
      # - name: Select Xcode
      #   run: sudo xcode-select -s /Applications/Xcode_26.app
      # /Applications/Xcode_26.0.app
      # /Applications/Xcode.app

      # ------------------------------------------------------------
      # Build IPA
      # ------------------------------------------------------------
      - name: Build IPA
        run: |
          flutter build ipa \
            --release \
            --export-method app-store

      # ------------------------------------------------------------
      # Rename IPA
      # ------------------------------------------------------------
      - name: Rename IPA
        run: |
          VERSION=${{ needs.verify.outputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          mv build/ios/ipa/*.ipa \
             build/ios/ipa/${APP_NAME}-${VERSION}.ipa

      # # ------------------------------------------------------------
      # # Upload IPA to GitHub Release
      # # ------------------------------------------------------------
      # - name: Upload IPA to GitHub Release
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     tag_name: ${{ github.ref_name }}
      #     files: |
      #       build/ios/ipa/${{ env.APP_NAME }}-${{ needs.verify.outputs.version }}.ipa

      # ------------------------------------------------------------
      # Upload to TestFlight
      # ------------------------------------------------------------
      - name: Upload to TestFlight
        run: bundle exec fastlane ios beta
        env:
          IPA_PATH: build/ios/ipa/${{ env.APP_NAME }}-${{ needs.verify.outputs.version }}.ipa