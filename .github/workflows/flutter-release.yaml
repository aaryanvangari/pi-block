name: Flutter Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    env:
      APP_NAME: Pi-Block

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Java (required for Android builds)
      # ------------------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ------------------------------------------------------------
      # Flutter
      # ------------------------------------------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # ------------------------------------------------------------
      # Dependencies
      # ------------------------------------------------------------
      - name: Install dependencies
        run: flutter pub get

      # ------------------------------------------------------------
      # Formatting check (NO auto-format)
      # ------------------------------------------------------------
      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed .

      # ------------------------------------------------------------
      # Static analysis
      # ------------------------------------------------------------
      - name: Flutter analyze
        run: flutter analyze .

      # ------------------------------------------------------------
      # Tests
      # ------------------------------------------------------------
      - name: Run tests
        run: flutter test

      # ------------------------------------------------------------
      # Get version info
      # ------------------------------------------------------------
      - name: Get Flutter Version
        id: flutter_version
        uses: bungabear/flutter_version_read@main
        with:
          file: ./pubspec.yaml

      # ------------------------------------------------------------
      # Version safety check
      # ------------------------------------------------------------
      - name: Verify pubspec version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          PUB_VERSION=${{ steps.flutter_version.outputs.version_number }}

          echo "pubspec.yaml version: " ${{ steps.flutter_version.outputs.version_number }}
          echo "pubspec.yaml build: " ${{ steps.flutter_version.outputs.build_number }}
          echo "git tag version: $TAG_VERSION"

          if [ "$PUB_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            exit 1
          fi

      # ------------------------------------------------------------
      # Decode keystore
      # ------------------------------------------------------------
      - name: Decode Keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/piblock-release-key.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # ------------------------------------------------------------
      # Create key.properties dynamically
      # ------------------------------------------------------------
      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ vars.KEY_ALIAS }}
          storeFile=piblock-release-key.jks
          EOF

      # ------------------------------------------------------------
      # Build artifacts
      # ------------------------------------------------------------
      - name: Build release APK
        run: flutter build apk --release

      - name: Build release App Bundle
        run: flutter build appbundle --release

      # ------------------------------------------------------------
      # Rename artifacts with app name
      # ------------------------------------------------------------
      - name: Rename release artifacts
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${APP_NAME}-${VERSION}.apk

          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/${APP_NAME}-${VERSION}.aab

      # ------------------------------------------------------------
      # GitHub Release
      # ------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/${{ env.APP_NAME }}-${{ env.VERSION }}.apk
            build/app/outputs/bundle/release/${{ env.APP_NAME }}-${{ env.VERSION }}.aab

      
      # ------------------------------------------------------------
      # Decode Play service account
      # ------------------------------------------------------------
      - name: Decode Play Service Account
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON" | base64 --decode > play-account.json
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}

      # ------------------------------------------------------------
      # Upload to Play Store
      # ------------------------------------------------------------

      # Internal (dev builds)
      # - name: Upload Internal
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJson: play-account.json
      #     packageName: ${{ vars.PACKAGE_NAME }}
      #     releaseFiles: build/app/outputs/bundle/release/${{ env.APP_NAME }}-${{ env.VERSION }}.aab
      #     track: internal
      #     status: completed

      # Alpha (release builds)
      # - name: Upload Alpha
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJson: play-account.json
      #     packageName: ${{ vars.PACKAGE_NAME }}
      #     releaseFiles: build/app/outputs/bundle/release/${{ env.APP_NAME }}-${{ env.VERSION }}.aab
      #     track: alpha
      #     status: completed


      # ------------------------------------------------------------
      # Setup Fastlane
      # ------------------------------------------------------------
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      # ------------------------------------------------------------
      # Deploy to Google Play using Fastlane
      # ------------------------------------------------------------
      - name: Deploy to Internal
        run: bundle exec fastlane android internal
        env:
          PACKAGE_NAME: ${{ vars.PACKAGE_NAME }}
          GOOGLE_CLOUD_SERVICE_ACCOUNT_JSON: play-account.json
          AAB_PATH: build/app/outputs/bundle/release/${{ env.APP_NAME }}-${{ env.VERSION }}.aab

      - name: Promote to Alpha
        run: bundle exec fastlane android alpha
        env:
          PACKAGE_NAME: ${{ vars.PACKAGE_NAME }}
          GOOGLE_CLOUD_SERVICE_ACCOUNT_JSON: play-account.json
